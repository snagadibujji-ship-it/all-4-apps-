openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LocalMart API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: shops
  - name: products
  - name: orders
  - name: delivery
  - name: admin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateMe
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # SHOPS
  /shops:
    get:
      operationId: listShops
      tags: [shops]
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shop"
    post:
      operationId: createShop
      tags: [shops]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"

  /shops/mine:
    get:
      operationId: getMyShop
      tags: [shops]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"

  /shops/{id}:
    get:
      operationId: getShop
      tags: [shops]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopWithProducts"
    patch:
      operationId: updateShop
      tags: [shops]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"

  /shops/{id}/products:
    get:
      operationId: listShopProducts
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  # PRODUCTS
  /products/{id}:
    patch:
      operationId: updateProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ORDERS
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithItems"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/vendor/all:
    get:
      operationId: listVendorOrders
      tags: [orders]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  # DELIVERY
  /delivery/jobs:
    get:
      operationId: listAvailableJobs
      tags: [delivery]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryJob"

  /delivery/jobs/{id}/accept:
    post:
      operationId: acceptJob
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryJob"

  /delivery/jobs/{id}/status:
    patch:
      operationId: updateJobStatus
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobStatusUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryJob"

  /delivery/my-jobs:
    get:
      operationId: listMyJobs
      tags: [delivery]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryJob"

  # ADMIN
  /admin/shops:
    get:
      operationId: adminListShops
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shop"

  /admin/shops/{id}/status:
    patch:
      operationId: adminUpdateShopStatus
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopStatusUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/orders:
    get:
      operationId: adminListOrders
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /admin/categories:
    get:
      operationId: listCategories
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /admin/categories/{id}:
    delete:
      operationId: deleteCategory
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # AUTH
    RegisterInput:
      type: object
      required: [name, email, phone, password]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [customer, vendor, delivery]
        address:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, phone, role]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [customer, vendor, delivery, admin]
        address:
          type: ["string", "null"]
        createdAt:
          type: ["string", "null"]

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: string

    # SHOPS
    Shop:
      type: object
      required: [id, ownerId, name, slug, category, area, status]
      properties:
        id:
          type: integer
        ownerId:
          type: integer
        name:
          type: string
        slug:
          type: string
        category:
          type: string
        description:
          type: ["string", "null"]
        area:
          type: string
        logoUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, active, suspended]
        createdAt:
          type: ["string", "null"]

    ShopWithProducts:
      allOf:
        - $ref: "#/components/schemas/Shop"
        - type: object
          properties:
            products:
              type: array
              items:
                $ref: "#/components/schemas/Product"

    ShopInput:
      type: object
      required: [name, slug, category, area]
      properties:
        name:
          type: string
        slug:
          type: string
        category:
          type: string
        description:
          type: string
        area:
          type: string
        logoUrl:
          type: string

    ShopUpdate:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        description:
          type: string
        area:
          type: string
        logoUrl:
          type: string

    ShopStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, active, suspended]

    # PRODUCTS
    Product:
      type: object
      required: [id, shopId, name, price, inStock]
      properties:
        id:
          type: integer
        shopId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: string
        imageUrl:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        inStock:
          type: boolean
        createdAt:
          type: ["string", "null"]

    ProductInput:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: string
        imageUrl:
          type: string
        category:
          type: string
        inStock:
          type: boolean

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: string
        imageUrl:
          type: string
        category:
          type: string
        inStock:
          type: boolean

    # ORDERS
    Order:
      type: object
      required: [id, customerId, shopId, status, total, deliveryFee, deliveryAddress]
      properties:
        id:
          type: integer
        customerId:
          type: integer
        shopId:
          type: integer
        status:
          type: string
          enum: [placed, confirmed, preparing, ready, picked_up, delivered, cancelled]
        total:
          type: string
        deliveryFee:
          type: string
        deliveryAddress:
          type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: ["string", "null"]
        updatedAt:
          type: ["string", "null"]

    OrderItem:
      type: object
      required: [id, orderId, productId, quantity, unitPrice]
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        quantity:
          type: integer
        unitPrice:
          type: string

    OrderWithItems:
      allOf:
        - $ref: "#/components/schemas/Order"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/OrderItem"

    OrderInput:
      type: object
      required: [shopId, deliveryAddress, items]
      properties:
        shopId:
          type: integer
        deliveryAddress:
          type: string
        notes:
          type: string
        items:
          type: array
          items:
            type: object
            required: [productId, quantity]
            properties:
              productId:
                type: integer
              quantity:
                type: integer

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [confirmed, preparing, ready, cancelled]

    # DELIVERY
    DeliveryJob:
      type: object
      required: [id, orderId, status]
      properties:
        id:
          type: integer
        orderId:
          type: integer
        riderId:
          type: ["integer", "null"]
        status:
          type: string
          enum: [available, accepted, picked_up, delivered, cancelled]
        acceptedAt:
          type: ["string", "null"]
        pickedUpAt:
          type: ["string", "null"]
        deliveredAt:
          type: ["string", "null"]
        createdAt:
          type: ["string", "null"]

    JobStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [picked_up, delivered]

    # ADMIN
    Category:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: ["string", "null"]
        createdAt:
          type: ["string", "null"]

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        icon:
          type: string

    PlatformStats:
      type: object
      required: [totalUsers, totalShops, totalOrders, totalRevenue]
      properties:
        totalUsers:
          type: integer
        totalShops:
          type: integer
        totalOrders:
          type: integer
        totalRevenue:
          type: string
